name: Java CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Tahap Continuous Integration
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github # Penting: ID ini harus sama dengan di pom.xml
          settings-path: ${{ github.workspace }}
      - name: Compile Project
        run: mvn clean compile --batch-mode

        # 2. Tahap Continuous Testing
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
          server-id: github
          settings-path: ${{ github.workspace }}
      - name: Run Tests
        run: mvn test --batch-mode

        # 3. Tahap Continuous Inspection (SonarCloud)
  inspection:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn clean verify sonar:sonar --batch-mode \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.projectKey=aditya-0122_CobaAdit \
          -Dsonar.organization=aditya-0122 \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.java.binaries=target/classes
      - name: SonarCloud Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: target/sonar/report-task.txt

          # 4. Deployment (Hanya jika tahap sebelumnya sukses)
      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cetak lokasi workspace untuk debugging
          echo "Workspace: $GITHUB_WORKSPACE"
          # Cari file settings.xml di mana pun ia berada
          find . -name "settings.xml"
          
          # Gunakan path absolut yang dihasilkan setup-java
          mvn deploy -s "${{ github.workspace }}/settings.xml" -DskipTests